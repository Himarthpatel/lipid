<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lipid Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .header { text-align: center; padding: 10px; }
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 25px; 
            padding: 10px;
        }
        @media (max-width: 500px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); height: 450px; }
        #status { text-align: center; font-size: 0.9em; font-weight: bold; color: #007bff; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Lipid Profile Analysis</h2>
        <div id="status">🔄 Loading...</div>
    </div>

    <div class="dashboard-grid">
        <div class="card"><canvas id="chartCHOL"></canvas></div>
        <div class="card"><canvas id="chartLDL"></canvas></div>
        <div class="card"><canvas id="chartTRIG"></canvas></div>
        <div class="card"><canvas id="chartHDL"></canvas></div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjzaygr0UXnmx1Bf54g1a242qb11IPXTRSyeP3ZmLLCNOkl6yAXQ4WYw3nhbKR9l2el98at4uKdTsH/pub?gid=926531515&single=true&output=csv';

        async function init() {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').filter(r => r.trim() !== "").map(row => row.split(','));

                const data = rows.slice(1).map(cols => ({
                    date: cols[0]?.trim() || "",
                    chol: parseFloat(cols[1]),
                    ldl: parseFloat(cols[2]),
                    trig: parseFloat(cols[3]),
                    hdl: parseFloat(cols[4]),
                    meds: cols[5]?.trim() || "N/A"
                })).filter(d => d.date !== "" && !isNaN(d.chol));

                if (data.length === 0) { statusEl.innerText = "⚠️ No data found."; return; }

                // Strictly using the names from your sheet
                createChart("chartCHOL", "CHOL", data, "chol", "#e67e22", 200, "< 200");
                createChart("chartLDL", "LDL-D", data, "ldl", "#c0392b", 100, "< 100");
                createChart("chartTRIG", "TRIG", data, "trig", "#7e5109", 150, "< 150");
                createChart("chartHDL", "HDL", data, "hdl", "#27ae60", 40, "> 40");

                statusEl.innerText = "✅ Dashboard Live";
                statusEl.style.color = "#27ae60";

            } catch (err) {
                statusEl.innerText = "❌ Sync Error";
            }
        }

            const ctx = document.getElementById(id).getContext('2d');

                    type: 'line', yMin: limit, yMax: limit, borderColor: color, borderDash: [6,6], borderWidth: 2,
                    label: { display: true, content: 'Target ' + limitLabel, position: 'end', backgroundColor: 'white', color: color, font: {size: 10, weight: 'bold'}, padding: 4}
                }
            };

            let currentMed = data[0].meds;
            let start = 0;
            const phaseColors = [

                'rgba(241, 196, 15, 0.12)', 
                'rgba(52, 152, 219, 0.12)', 
                'rgba(155, 89, 182, 0.12)' 
            ];
            let colorIdx = 0;

            for (let i = 0; i <= data.length; i++) {
                if (i === data.length || data[i].meds !== currentMed) {
