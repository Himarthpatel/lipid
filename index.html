<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lipid Profile & Phase Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 1100px; margin: auto; background: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
        label { font-weight: bold; font-size: 0.8em; color: #444; margin-bottom: 5px; display: block; }
        button { background: #007bff; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; font-weight: bold; }
        button:active { transform: scale(0.98); }
        .chart-container { height: 600px; min-height: 400px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #e9ecef; }
        .hint { font-size: 0.75em; color: #888; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Blood Work Entry</h2>
        <div class="grid">
            <div><label>Date</label><input type="date" id="date"></div>
            <div><label>Total CHOL</label><input type="number" id="chol"></div>
            <div><label>LDL-D</label><input type="number" id="ldl"></div>
            <div><label>Triglycerides</label><input type="number" id="trig"></div>
            <div><label>HDL</label><input type="number" id="hdl"></div>
            <div>
                <label>Medication/Regime</label>
                <input type="text" id="meds" placeholder="e.g. Lipitor 20mg">
                <div class="hint">Leave blank to keep current regime</div>
            </div>
        </div>
        <button id="saveBtn" onclick="addData()">Save Entry</button>
    </div>

    <div class="card chart-container">
        <canvas id="lipidChart"></canvas>
    </div>

    <div class="card">
        <h3>History</h3>
        <table id="historyTable">
            <thead>
                <tr><th>Date</th><th>CHOL</th><th>LDL-D</th><th>TRIG</th><th>HDL</th><th>Regime</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="clearData()" style="background:#ff4d4d; width: auto; margin-top: 30px;">Reset All Data</button>
    </div>

    <script>
        // Use a unique key to avoid conflicts with previous broken versions
        let myData = JSON.parse(localStorage.getItem('lipidLogsFinal_v1')) || [];

        function addData() {
            const dateVal = document.getElementById('date').value;
            const cholVal = document.getElementById('chol').value;
            let medsInput = document.getElementById('meds').value.trim();
            
            if(!dateVal || !cholVal) {
                alert("Please enter at least the Date and Total Cholesterol.");
                return;
            }

            // Carry forward medication if blank
            if (medsInput === "" && myData.length > 0) {
                medsInput = myData[myData.length - 1].meds;
            } else if (medsInput === "") {
                medsInput = "Initial Phase";
            }

            const entry = {
                date: dateVal,
                chol: parseInt(cholVal),
                ldl: parseInt(document.getElementById('ldl').value) || 0,
                trig: parseInt(document.getElementById('trig').value) || 0,
                hdl: parseInt(document.getElementById('hdl').value) || 0,
                meds: medsInput
            };

            myData.push(entry);
            myData.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('lipidLogsFinal_v1', JSON.stringify(myData));
            
            // Visual feedback
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Saved!";
            btn.style.background = "#28a745";
            
            setTimeout(() => {
                btn.innerText = "Save Entry";
                btn.style.background = "#007bff";
                // Clear numeric inputs
                document.getElementById('chol').value = "";
                document.getElementById('ldl').value = "";
                document.getElementById('trig').value = "";
                document.getElementById('hdl').value = "";
                document.getElementById('meds').value = "";
                renderAll();
            }, 600);
        }

        function getPhaseAnnotations() {
            const annotations = {};
            if (myData.length === 0) return annotations;

            let currentMed = myData[0].meds;
            let startIndex = 0;
            const colors = [
                'rgba(200, 200, 200, 0.15)', 
                'rgba(40, 167, 69, 0.15)',   
                'rgba(255, 193, 7, 0.15)',   
                'rgba(220, 53, 69, 0.15)',   
                'rgba(0, 123, 255, 0.15)'    
            ];
            let colorIdx = 0;

            for (let i = 0; i <= myData.length; i++) {
                if (i === myData.length || myData[i].meds !== currentMed) {
                    const endIndex = i - 1;
                    annotations['phase' + i] = {
                        type: 'box',
                        xMin: startIndex - 0.4,
                        xMax: endIndex + 0.4,
                        backgroundColor: colors[colorIdx % colors.length],
                        label: {
                            content: currentMed,
                            display: true,
                            position: 'top',
                            backgroundColor: 'rgba(255,255,255,0.8)',
                            font: { size: 11, weight: 'bold' }
                        }
                    };
                    if (i < myData.length) {
                        currentMed = myData[i].meds;
                        startIndex = i;
                        colorIdx++;
                    }
                }
            }

            const thresholds = [
                { val: 200, col: 'orange' },
                { val: 150, col: 'brown' },
                { val: 70, col: 'red' },
                { val: 40, col: 'green' }
            ];

            thresholds.forEach((t, index) => {
                annotations['line' + index] = {
                    type: 'line',
                    yMin: t.val,
                    yMax: t.val,
                    borderColor: t.col,
                    borderDash: [5, 5],
                    borderWidth: 1.5,
                    label: { content: t.val, display: true, position: 'end', font: {size: 10} }
                };
            });

            return annotations;
        }

        function updateChart() {
            const ctx = document.getElementById('lipidChart').getContext('2d');
            if (window.chartObj) window.chartObj.destroy();
            
            window.chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: myData.map(d => d.date),
                    datasets: [
                        { label: 'CHOL', data: myData.map(d => d.chol), borderColor: 'orange', backgroundColor: 'orange', tension: 0, borderWidth: 3 },
                        { label: 'LDL-D', data: myData.map(d => d.ldl), borderColor: 'red', backgroundColor: 'red', tension: 0, borderWidth: 3 },
                        { label: 'TRIG', data: myData.map(d => d.trig), borderColor: 'brown', backgroundColor: 'brown', tension: 0, borderWidth: 3 },
                        { label: 'HDL', data: myData.map(d => d.hdl), borderColor: 'green', backgroundColor: 'green', tension: 0, borderWidth: 3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        annotation: { annotations: getPhaseAnnotations() },
                        legend: { position: 'bottom' }
                    },
                    scales: { 
                        y: { beginAtZero: true } 
                    }
                }
            });
        }

        function renderAll() {
            const tbody = document.querySelector("#historyTable tbody");
            tbody.innerHTML = "";
            myData.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.date}</td>
                    <td>${item.chol}</td>
                    <td>${item.ldl || 0}</td>
                    <td>${item.trig || 0}</td>
                    <td>${item.hdl || 0}</td>
                    <td><span class="badge">${item.meds}</span></td>
                </tr>`;
            });
            updateChart();
        }

        function clearData() { if(confirm("Erase all data?")) { localStorage.clear(); myData = []; renderAll(); } }
        renderAll();
    </script>
</body>
</html>
