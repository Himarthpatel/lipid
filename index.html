<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lipid Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .header { text-align: center; padding: 10px; }
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 20px; 
            padding: 10px;
        }
        @media (max-width: 500px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); height: 400px; }
        h3 { margin: 0 0 10px 0; font-size: 1.1em; color: #333; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        #status { text-align: center; font-size: 0.8em; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Lipid Profile Analysis</h2>
        <div id="status">Syncing Data...</div>
    </div>

    <div class="dashboard-grid">
        <div class="card"><canvas id="chartCHOL"></canvas></div>
        <div class="card"><canvas id="chartLDL"></canvas></div>
        <div class="card"><canvas id="chartTRIG"></canvas></div>
        <div class="card"><canvas id="chartHDL"></canvas></div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjzaygr0UXnmx1Bf54g1a242qb11IPXTRSyeP3ZmLLCNOkl6yAXQ4WYw3nhbKR9l2el98at4uKdTsH/pub?gid=926531515&single=true&output=csv';

        async function loadAndDraw() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(','));
                const data = rows.slice(1).map(cols => ({
                    date: cols[0]?.trim(),
                    chol: parseInt(cols[1]),
                    ldl: parseInt(cols[2]),
                    trig: parseInt(cols[3]),
                    hdl: parseInt(cols[4]),
                    meds: cols[5]?.trim() || "N/A"
                })).filter(d => d.date && !isNaN(d.chol));

                document.getElementById('status').innerText = "Dashboard Updated: " + new Date().toLocaleTimeString();

                createChart("chartCHOL", "Total Cholesterol", data, "chol", "orange", 200, "Target < 200");
                createChart("chartLDL", "LDL-D (Bad Cholesterol)", data, "ldl", "red", 100, "Target < 100");
                createChart("chartTRIG", "Triglycerides", data, "trig", "brown", 150, "Target < 150");
                createChart("chartHDL", "HDL (Good Cholesterol)", data, "hdl", "green", 40, "Target > 40");

            } catch (err) {
                document.getElementById('status').innerText = "Sync Error.";
            }
        }

        function createChart(canvasId, title, data, key, color, limit, limitLabel) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // Build Medication Annotations
            const annotations = {
                targetLine: {
                    type: 'line', yMin: limit, yMax: limit, borderColor: color, borderDash: [6, 6], borderWidth: 2,
                    label: { display: true, content: limitLabel, position: 'end', backgroundColor: 'rgba(255,255,255,0.8)', color: color, font: {size: 10, weight: 'bold'}}
                }
            };

            let currentMed = data[0].meds;
            let startIdx = 0;
            for (let i = 0; i <= data.length; i++) {
                if (i === data.length || data[i].meds !== currentMed) {
                    annotations['phase' + i] = {
                        type: 'box', xMin: startIdx - 0.5, xMax: i - 1 + 0.5,
                        backgroundColor: 'rgba(200,200,200,0.05)', borderWidth: 0,
                        label: {
                            content: currentMed.toUpperCase(), display: true, position: { x: 'center', y: 'start' },
                            yAdjust: 5, backgroundColor: 'white', color: '#666', font: { size: 9, weight: 'bold' }, padding: 4
                        }
                    };
                    if (i < data.length) { currentMed = data[i].meds; startIdx = i; }
                }
            }

            new Chart(ctx, {
                type: '
