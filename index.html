<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lipid Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .header { text-align: center; padding: 10px; }
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 20px; 
            padding: 10px;
        }
        @media (max-width: 500px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); height: 400px; }
        #status { text-align: center; font-size: 0.9em; font-weight: bold; color: #007bff; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Lipid Profile Analysis</h2>
        <div id="status">🔄 Initializing connection to Google Sheets...</div>
    </div>

    <div class="dashboard-grid">
        <div class="card"><canvas id="chartCHOL"></canvas></div>
        <div class="card"><canvas id="chartLDL"></canvas></div>
        <div class="card"><canvas id="chartTRIG"></canvas></div>
        <div class="card"><canvas id="chartHDL"></canvas></div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjzaygr0UXnmx1Bf54g1a242qb11IPXTRSyeP3ZmLLCNOkl6yAXQ4WYw3nhbKR9l2el98at4uKdTsH/pub?gid=926531515&single=true&output=csv';

        async function initDashboard() {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                
                // Parse CSV rows
                const rows = text.split('\n').map(row => row.split(','));
                
                // Clean and Map Data
                const data = rows.slice(1).map(cols => ({
                    date: cols[0] ? cols[0].trim() : "",
                    chol: parseFloat(cols[1]),
                    ldl: parseFloat(cols[2]),
                    trig: parseFloat(cols[3]),
                    hdl: parseFloat(cols[4]),
                    meds: cols[5] ? cols[5].trim() : "Default"
                })).filter(item => item.date !== "" && !isNaN(item.chol));

                if (data.length === 0) {
                    statusEl.innerText = "⚠️ No data found in the sheet. Please check your columns.";
                    return;
                }

                // Render all charts
                renderChart("chartCHOL", "Total Cholesterol", data, "chol", "orange", 200, "Target < 200");
                renderChart("chartLDL", "LDL-D (Bad)", data, "ldl", "red", 100, "Target < 100");
                renderChart("chartTRIG", "Triglycerides", data, "trig", "brown", 150, "Target < 150");
                renderChart("chartHDL", "HDL (Good)", data, "hdl", "green", 40, "Target > 40");

                statusEl.innerText = "✅ Dashboard Live. Last sync: " + new Date().toLocaleTimeString();
                statusEl.style.color = "#28a745";

            } catch (err) {
                console.error(err);
                statusEl.innerText = "❌ Connection Failed. Check your internet or Google Sheet Publication.";
                statusEl.style.color = "#dc3545";
            }
        }

        function renderChart(canvasId, title, data, key, color, targetVal, targetLabel) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            const annotations = {
                targetLine: {
                    type: 'line', yMin: targetVal, yMax: targetVal,
                    borderColor: color, borderDash: [6, 6], borderWidth: 2,
                    label: {
                        display: true, content: targetLabel, position: 'end',
                        backgroundColor: 'rgba(255,255,255,0.9)', color: color,
                        font: { size: 10, weight: 'bold' }
                    }
                }
            };

            // Build Medication/Phase Backgrounds
            let currentMed = data[0].meds;
            let startIdx = 0;
            for (let i = 0; i <= data.length; i++) {
                if (i === data.length || data[i].meds !== currentMed) {
                    annotations['phase' + i] = {
                        type: 'box', xMin: startIdx - 0.5, xMax: i - 1 + 0.5,
                        backgroundColor: 'rgba(0,0,0,0.03)', borderWidth: 0,
                        label: {
                            content: currentMed.toUpperCase(), display: true, position: { x: 'center', y: 'start' },
                            yAdjust: 10, backgroundColor: 'white', color: '#666', 
                            font: { size: 10, weight: 'bold' }, padding: 4, borderRadius: 4, borderWidth: 1, borderColor: '#ddd'
                        }
                    };
                    if (i < data.length) { currentMed = data[i].meds; startIdx = i; }
                }
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: title, data: data.map(d => d[key]),
                        borderColor: color, backgroundColor: color, tension: 0.2, borderWidth: 3, pointRadius: 5
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: title, font: { size: 16 } },
                        legend: { display: false },
                        annotation: { annotations: annotations },
                        datalabels: { 
                            align: 'top', font: { weight: 'bold' }, color: color,
                            formatter: (v) => Math.round(v)
                        }
                    },
                    scales: { 
                        y: { beginAtZero: true, grace: '35%', title: { display: true, text: 'mg/dL' } },
                        x: { ticks: { maxRotation: 45, minRotation: 45, font: { size: 10 } } }
                    }
                }
            });
        }

        // Run when page is ready
        window.onload = initDashboard;
    </script>
</body>
</html>
