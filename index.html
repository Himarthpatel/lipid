<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lipid Profile Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 900px; margin: auto; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1 adapter; gap: 10px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; }
        label { font-weight: bold; font-size: 0.9em; display: block; margin-top: 10px; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 15px; }
        .chart-container { height: 400px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Blood Work Entry</h2>
        <div class="grid">
            <div>
                <label>Date</label>
                <input type="date" id="date">
                <label>Total CHOL</label>
                <input type="number" id="chol" placeholder="mg/dL">
                <label>LDL-C</label>
                <input type="number" id="ldl" placeholder="mg/dL">
            </div>
            <div>
                <label>Triglycerides</label>
                <input type="number" id="trig" placeholder="mg/dL">
                <label>HDL</label>
                <input type="number" id="hdl" placeholder="mg/dL">
                <label>Medication/Dose</label>
                <input type="text" id="meds" placeholder="e.g. Atorvastatin 20mg">
            </div>
        </div>
        <button onclick="addData()">Save Profile</button>
    </div>

    <div class="card chart-container">
        <canvas id="lipidChart"></canvas>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h3>History</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>CHOL</th>
                    <th>LDL</th>
                    <th>TRIG</th>
                    <th>HDL</th>
                    <th>Medication</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="clearData()" style="background:#dc3545; margin-top:30px; font-size: 12px; width: auto;">Delete All Data</button>
    </div>

    <script>
        let myData = JSON.parse(localStorage.getItem('lipidLogsV2')) || [];

        function addData() {
            const entry = {
                date: document.getElementById('date').value,
                chol: parseInt(document.getElementById('chol').value),
                ldl: parseInt(document.getElementById('ldl').value),
                trig: parseInt(document.getElementById('trig').value),
                hdl: parseInt(document.getElementById('hdl').value),
                meds: document.getElementById('meds').value
            };

            if(!entry.date || isNaN(entry.chol)) return alert("Please enter at least Date and Total Cholesterol");

            myData.push(entry);
            myData.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('lipidLogsV2', JSON.stringify(myData));
            renderAll();
        }

        function renderAll() {
            const tbody = document.querySelector("#historyTable tbody");
            tbody.innerHTML = "";
            myData.forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>${item.date}</td>
                    <td>${item.chol}</td>
                    <td>${item.ldl || '-'}</td>
                    <td>${item.trig || '-'}</td>
                    <td>${item.hdl || '-'}</td>
                    <td>${item.meds}</td>
                </tr>`;
            });
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('lipidChart').getContext('2d');
            if (window.chartObj) window.chartObj.destroy();
            
            window.chartObj = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: myData.map(d => d.date),
                    datasets: [
                        { label: 'Total CHOL', data: myData.map(d => d.chol), borderColor: '#212529', tension: 0.2 },
                        { label: 'LDL', data: myData.map(d => d.ldl), borderColor: '#dc3545', tension: 0.2 },
                        { label: 'Triglycerides', data: myData.map(d => d.trig), borderColor: '#ffc107', tension: 0.2 },
                        { label: 'HDL', data: myData.map(d => d.hdl), borderColor: '#198754', tension: 0.2 }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        function clearData() { if(confirm("Erase all data permanently?")) { localStorage.clear(); myData = []; renderAll(); } }
        renderAll();
    </script>
</body>
</html>
